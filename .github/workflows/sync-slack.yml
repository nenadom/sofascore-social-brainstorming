name: Sync HTML files from Slack

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch HTML files from Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL_ID" ]; then
            echo "::warning::SLACK_BOT_TOKEN or SLACK_CHANNEL_ID not configured — skipping sync"
            exit 0
          fi

          touch .slack-synced

          page=1
          has_more=true

          while [ "$has_more" = "true" ]; do
            response=$(curl -sf -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              "https://slack.com/api/files.list?channel=$SLACK_CHANNEL_ID&count=100&page=$page")

            ok=$(echo "$response" | jq -r '.ok')
            if [ "$ok" != "true" ]; then
              echo "::error::Slack API error: $(echo "$response" | jq -r '.error')"
              exit 1
            fi

            echo "$response" | jq -r '
              .files[]
              | select(.name != null)
              | select((.name | test("\\.html$"; "i")) or .filetype == "html")
              | [.id, .name, .url_private_download] | @tsv
            ' | while IFS=$'\t' read -r id name url; do
              [ -z "$id" ] && continue

              if grep -q "^$id " .slack-synced 2>/dev/null; then
                echo "Already synced: $name"
                continue
              fi

              # Sanitize filename: lowercase, replace special chars with hyphens, collapse runs
              safe_name=$(echo "$name" | \
                sed 's/[–—]/-/g' | \
                tr '[:upper:]' '[:lower:]' | \
                sed 's/ /-/g; s/[^a-z0-9._-]//g; s/-\{2,\}/-/g; s/^-//; s/-\.\(html\)$/.\1/')
              # Ensure .html extension
              [[ "$safe_name" != *.html ]] && safe_name="${safe_name}.html"

              echo "Downloading: $name -> $safe_name"
              if curl -sf -H "Authorization: Bearer $SLACK_BOT_TOKEN" "$url" -o "$safe_name"; then
                echo "$id $safe_name" >> .slack-synced
                echo "Saved: $safe_name"
              else
                echo "::warning::Failed to download: $name"
              fi
            done

            total_pages=$(echo "$response" | jq -r '.paging.pages // 1')
            page=$((page + 1))
            [ "$page" -gt "$total_pages" ] && has_more=false
          done

      - name: Regenerate index.html
        run: |
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Sofascore Social — Prototypes</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e1a; color: #e0e4ef; min-height: 100vh; padding: 3rem 1.5rem; }
                  .container { max-width: 720px; margin: 0 auto; }
                  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
                  .subtitle { color: #8890a4; margin-bottom: 2.5rem; font-size: 0.95rem; }
                  .card { display: block; background: #141825; border: 1px solid #1e2438; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; text-decoration: none; color: inherit; transition: border-color 0.2s, background 0.2s; }
                  .card:hover { border-color: #3a7bfd; background: #181d30; }
                  .card h2 { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 0.35rem; }
                  .card p { font-size: 0.85rem; color: #8890a4; }
                  #gate { position: fixed; inset: 0; background: #0a0e1a; display: flex; align-items: center; justify-content: center; z-index: 100; }
                  #gate.hidden { display: none; }
                  .gate-box { text-align: center; max-width: 320px; width: 100%; }
                  .gate-box h2 { color: #fff; font-size: 1.25rem; margin-bottom: 1.5rem; }
                  .gate-box input { width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #1e2438; background: #141825; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
                  .gate-box input:focus { border-color: #3a7bfd; }
                  .gate-box input.error { border-color: #e5484d; }
                  .gate-box .hint { color: #e5484d; font-size: 0.8rem; margin-top: 0.5rem; opacity: 0; transition: opacity 0.2s; }
                  .gate-box .hint.visible { opacity: 1; }
                  #content { display: none; }
                  #content.visible { display: block; }
              </style>
          </head>
          <body>
              <div id="gate">
                  <div class="gate-box">
                      <h2>Sofascore Social Prototypes</h2>
                      <input type="password" id="pw" placeholder="Enter password" autocomplete="off" autofocus>
                      <p class="hint" id="hint">Wrong password</p>
                  </div>
              </div>
              <div id="content" class="container">
                  <h1>Sofascore Social — Prototypes</h1>
                  <p class="subtitle">Interactive HTML prototypes exploring social and engagement features.</p>
          HTMLEOF

          for f in *.html; do
            [ "$f" = "index.html" ] && continue
            [ -f "$f" ] || continue
            title=$(grep -oP '(?<=<title>).*?(?=</title>)' "$f" | head -1)
            [ -z "$title" ] && title="${f%.html}"
            cat >> index.html << CARD
                  <a class="card" href="$f">
                      <h2>$title</h2>
                  </a>
          CARD
          done

          cat >> index.html << 'HTMLEOF'
              </div>
              <script>
                  const HASH = '3e0d0d8776f61f36aadf080eefbcddde65b8b6e0402976971c5c7268aa1f5622';
                  const KEY = 'ss_proto_auth';
                  async function sha256(str) {
                      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
                      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
                  }
                  function unlock() {
                      document.getElementById('gate').classList.add('hidden');
                      document.getElementById('content').classList.add('visible');
                      sessionStorage.setItem(KEY, '1');
                  }
                  if (sessionStorage.getItem(KEY) === '1') unlock();
                  document.getElementById('pw').addEventListener('keydown', async (e) => {
                      if (e.key !== 'Enter') return;
                      const hash = await sha256(e.target.value);
                      if (hash === HASH) { unlock(); } else {
                          e.target.classList.add('error');
                          document.getElementById('hint').classList.add('visible');
                          setTimeout(() => { e.target.classList.remove('error'); document.getElementById('hint').classList.remove('visible'); }, 1500);
                      }
                  });
              </script>
          </body>
          </html>
          HTMLEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync: update prototypes from Slack"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
